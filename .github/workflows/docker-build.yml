name: Build and Update GitOps

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # Checkout app repo
      - name: Checkout
        uses: actions/checkout@v4

      # Setup QEMU
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Setup Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Create short SHA
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # Build and Push
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ env.SHORT_SHA }}

      # Checkout GitOps repo
      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: pauldjmetsi/fastapi-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      # Update image tag
      - name: Update HelmRelease Image Tag
        run: |
          sed -i 's/tag: ".*"/tag: "${{ env.SHORT_SHA }}"/' gitops/clusters/dev/helmrelease.yaml

      # Commit and Push changes
      - name: Commit and Push
        run: |
          cd gitops
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .
          git commit -m "Update dev image tag to ${{ github.sha }}"
          git push